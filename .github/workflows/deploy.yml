name: Deploy MkDocs

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.1.1

      - uses: actions/setup-python@v5.1.0
        with:
          python-version: 3.11

      - run: pip install mkdocs mkdocs-material

      - run: mkdocs build

      - uses: actions/upload-pages-artifact@v3.0.0
        with:
          path: site

      - uses: actions/deploy-pages@v4.0.5
